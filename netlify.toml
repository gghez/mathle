# Netlify deployment config for the Mathle PWA (static site, no backend).
# `vite build` copies public/ into dist/ — there is no separate asset build.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the immutable, content-hashed build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
